<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hamadine - Les dunes de ma vie | Rien qu'un homme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="player-card">
            <!-- En-tête de l'album -->
            <div class="album-header">
                <div class="album-art-wrapper">
                    <img id="albumArt" src="musique/cover.jpg" alt="Hamadine - Les dunes de ma vie" class="album-art" onerror="this.src='https://via.placeholder.com/300x300/1a1a2e/c4d2ff?text=Hamadine'">
                    <div class="vinyl-effect"></div>
                </div>
                <div class="album-info">
                    <h1 class="album-title">Les dunes de ma vie</h1>
                    <p class="album-artist">Hamadine</p>
                    <div class="album-subtitle">"Rien qu'un homme"</div>
                    <div class="song-count" id="songCount">Chargement...</div>
                </div>
            </div>

            <!-- Lecteur principal -->
            <div class="player-controls">
                <div class="song-info">
                    <h2 id="currentSongTitle" class="current-song">Hamadine sur les dunes</h2>
                    <p id="currentSongArtist" class="current-artist">Hamadine</p>
                </div>

                <div class="progress-section">
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="time-info">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="buttons">
                    <button id="shuffleBtn" class="control-btn" title="Lecture aléatoire">🔀</button>
                    <button id="prevBtn" class="control-btn" title="Titre précédent">⏮</button>
                    <button id="playPauseBtn" class="control-btn play-btn" title="Lecture/Pause">▶</button>
                    <button id="nextBtn" class="control-btn" title="Titre suivant">⏭</button>
                    <button id="repeatBtn" class="control-btn" title="Répéter">🔁</button>
                </div>

                <div class="volume-section">
                    <span class="volume-icon">🔊</span>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
                </div>
            </div>

            <!-- Paroles synchronisées -->
            <div class="lyrics-section">
                <div class="lyrics-header">
                    <h3>📜 Paroles synchronisées</h3>
                    <button id="toggleLyricsMode" class="mode-btn">🎬 Mode plein écran</button>
                </div>
                <div class="lyrics-container" id="lyricsContainer">
                    <div class="lyrics-content" id="lyricsContent">
                        <p class="lyrics-placeholder">Chargement des paroles...</p>
                    </div>
                </div>
            </div>

            <!-- Playlist -->
            <div class="playlist-section">
                <div class="playlist-header">
                    <h3>🎵 Liste des titres</h3>
                    <div class="playlist-controls">
                        <span class="playlist-count" id="playlistCount"></span>
                    </div>
                </div>
                <div class="playlist-container" id="playlistContainer">
                    <ul class="playlist" id="playlist">
                        <li class="playlist-loading">Recherche des fichiers...</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal plein écran -->
    <div id="fullscreenModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalSongTitle">Hamadine - Les dunes de ma vie</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            <div class="modal-lyrics" id="modalLyrics">
                <div class="lyrics-content-full" id="lyricsContentFull">
                    <p>Chargement...</p>
                </div>
            </div>
            <div class="modal-controls">
                <button id="modalPrevBtn">⏮ Titre précédent</button>
                <button id="modalPlayPauseBtn">⏸ Pause</button>
                <button id="modalNextBtn">Titre suivant ⏭</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>

    <script src="script.js"></script>
</body>
</html>
