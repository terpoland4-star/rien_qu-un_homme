<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rien qu'un homme - Lecteur Album</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Interface principale -->
        <div class="player-card">
            <div class="album-header">
                <div class="album-art-wrapper">
                    <img id="albumArt" src="cover.jpg" alt="Rien qu'un homme" class="album-art">
                    <div class="vinyl-effect"></div>
                </div>
                <div class="album-info">
                    <h1 class="album-title">Rien qu'un homme</h1>
                    <p class="album-artist">[Nom de l'artiste]</p>
                    <div class="song-count">14 titres</div>
                </div>
            </div>

            <!-- Contrôles principaux -->
            <div class="player-controls">
                <div class="song-info">
                    <h2 id="currentSongTitle" class="current-song">Chargement...</h2>
                    <p id="currentSongArtist" class="current-artist">Artiste</p>
                </div>

                <div class="progress-section">
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="time-info">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="buttons">
                    <button id="shuffleBtn" class="control-btn" title="Lecture aléatoire">🔀</button>
                    <button id="prevBtn" class="control-btn">⏮</button>
                    <button id="playPauseBtn" class="control-btn play-btn">▶</button>
                    <button id="nextBtn" class="control-btn">⏭</button>
                    <button id="repeatBtn" class="control-btn" title="Répéter">🔁</button>
                </div>

                <div class="volume-section">
                    <span class="volume-icon">🔊</span>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
                </div>
            </div>

            <!-- Zone d'affichage des paroles -->
            <div class="lyrics-section">
                <div class="lyrics-header">
                    <h3>Paroles synchronisées</h3>
                    <button id="toggleLyricsMode" class="mode-btn">📜 Mode plein écran</button>
                </div>
                <div class="lyrics-container" id="lyricsContainer">
                    <div class="lyrics-content" id="lyricsContent">
                        <p class="lyrics-placeholder">Chargement des paroles...</p>
                    </div>
                </div>
            </div>

            <!-- Playlist -->
            <div class="playlist-section">
                <div class="playlist-header">
                    <h3>Liste des titres</h3>
                    <div class="playlist-controls">
                        <button id="expandPlaylist" class="icon-btn">📋</button>
                    </div>
                </div>
                <div class="playlist-container" id="playlistContainer">
                    <ul class="playlist" id="playlist">
                        <!-- La playlist sera générée dynamiquement -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal pour les paroles en plein écran -->
    <div id="fullscreenModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalSongTitle">Rien qu'un homme</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            <div class="modal-lyrics" id="modalLyrics">
                <div class="lyrics-content-full" id="lyricsContentFull">
                    <p>Chargement...</p>
                </div>
            </div>
            <div class="modal-controls">
                <button id="modalPrevBtn">⏮ Titre précédent</button>
                <button id="modalPlayPauseBtn">▶ Pause</button>
                <button id="modalNextBtn">Titre suivant ⏭</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script src="lyrics.js"></script>
    <script src="script.js"></script>
</body>
</html>
